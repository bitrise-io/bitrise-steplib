title: Restore Cocoapods Cache
summary: Restores cached Cocoapods dependencies. This Step needs to be used in combination
  with **Save Cocoapods Cache**.
description: |
  Restores cached Cocoapods dependencies. This Step needs to be used in combination with **Save Cocoapods Cache**.

  This Step is based on [key-based caching](https://docs.bitrise.io/en/bitrise-ci/dependencies-and-caching/key-based-caching.html) and sets up the cache key and path automatically for Cocoapods dependencies. If you'd like to change the cache keys, you might want to use the generic [Restore cache](https://github.com/bitrise-steplib/bitrise-step-restore-cache) Step instead.

  #### Related steps

  [Save Cocoapods cache](https://github.com/bitrise-steplib/bitrise-step-save-cocoapods-cache/)

  [Restore cache](https://github.com/bitrise-steplib/bitrise-step-restore-cache/)
