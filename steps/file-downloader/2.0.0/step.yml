toolkit:
  go:
    package_name: github.com/bitrise-steplib/steps-file-downloader
run_if: .IsCI
inputs:
- opts:
    description: |-
      The URL to download the file from. It can be either a direct URL or an
      Environment Variable that holds the URL.
    is_required: true
    summary: Download source URL.
    title: Download source URL
  source: null
- destination: null
  opts:
    description: |-
      The path where the downloaded file will be saved. The path should be
      relative to the root directory of the repository. Any missing parent
      directories are created automatically, and a leading `~` is expanded to
      the home directory.
    is_required: true
    summary: Download destination path.
    title: Download destination path
- file_permission: null
  opts:
    description: |-
      Permission bits for the destination file in the format of `644`.

      This option is useful for sensitive files that should have a permission like `600`.
    summary: Permission bits for the destination file.
    title: Destination file permission
- opts:
    description: |-
      When enabled, if writing the downloaded file to the destination fails
      because of a permission error, the Step retries the operation using
      `sudo`.

      The download itself is never run as root — only the destination directory
      creation, the file placement, and the permission change are retried with
      `sudo`. This requires passwordless (`sudo -n`) access on the machine.

      Disable this if you do not want the Step to ever escalate privileges.
    summary: Retry the file placement with sudo if it fails due to insufficient permissions.
    title: Use sudo as a fallback for protected destinations
    value_options:
    - "true"
    - "false"
  use_sudo: "true"
