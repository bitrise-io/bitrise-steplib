inputs:
- file: null
  opts:
    description: Path to the file in which the value replacement will be performed.
      The path must be relative to the repository root.
    is_required: true
    summary: The target file path in which you want to change a value.
    title: File path
- old_value: null
  opts:
    description: The exact string to search for and replace in the target file. The
      step fails if this value is not found and Mark the Step as Failed if not found
      is enabled.
    is_required: true
    summary: The current value which needs to be changed in the target file.
    title: Current value
- new_value: null
  opts:
    description: The string that replaces all occurrences of the current value in
      the target file.
    is_required: true
    summary: The new value you want to write to the target file.
    title: New value
- opts:
    description: When enabled, prints the full file content to the build log before
      and after the replacement.
    title: Print file content before and after the value change
    value_options:
    - "true"
    - "false"
  show_file: "false"
- notfound_exit: "true"
  opts:
    description: When enabled, the step fails if the current value is not found in
      the target file. Disable this to allow the step to succeed even if no replacement
      was made.
    title: Mark the Step as "Failed" if the selected value isn't found
    value_options:
    - "true"
    - "false"
- opts:
    description: |-
      When enabled, the step retries reading and writing the target file with `sudo` if it hits a permission error.

      This is required on stacks where the step runs as the non-root user and the target file is owned by `root`. Disable this if `sudo` is unavailable in your environment or you want permission errors to fail the step directly.
    title: Use sudo when elevated permissions are required
    value_options:
    - "true"
    - "false"
  use_sudo: "true"
