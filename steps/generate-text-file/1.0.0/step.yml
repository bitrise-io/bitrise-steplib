title: Generate Text File
summary: |
  Dynamically generate a text file
description: |
  This Step lets you generate a dynamic text file which can use any environment
  variables. The path of the file will be made available as
  `$GENERATED_TEXT_FILE_PATH`. This Step can e.g. be used to generate the Play
  Store's "What's New" file based on the Git commit message.
website: https://github.com/bitrise-steplib/bitrise-step-generate-text-file
source_code_url: https://github.com/bitrise-steplib/bitrise-step-generate-text-file
