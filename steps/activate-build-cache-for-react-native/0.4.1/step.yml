    description: Enables Bitrise Build Cache for Xcode. When enabled, activates Xcelerate
      and starts the Xcelerate proxy in the background.
    is_required: true
    summary: Enables Bitrise Build Cache for Xcode using Xcelerate
    title: Enable Xcode cache
    value_options:
    - "true"
    - "false"
  xcode_cache_enabled: "true"
- gradle_cache_enabled: "true"
  opts:
    description: Enables Bitrise Build Cache for Gradle. When enabled, activates Gradle
      cache with analytics and remote cache plugins.
    is_required: true
