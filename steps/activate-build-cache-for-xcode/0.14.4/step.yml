title: Build Cache for Xcode
summary: Activates Bitrise Remote Build Cache add-on for subsequent Xcode builds in
  the workflow
description: |
  This Step enables Bitrise's Build Cache Add‑On for Xcode by configuring the environment with the Build Cache CLI.

  After this Step runs, Xcode builds invoked via xcodebuild in subsequent workflow steps will automatically read from the remote cache and push new entries when applicable.

  The Step adds an alias to ~/.zshrc and ~/.bashrc so the wrapper is available in all following steps; from that point all xcodebuild calls are wrapped to enable compilation caching.
  Analytical data (command, duration, cache information, environment) is collected and sent to Bitrise and is available on the Build cache page: https://app.bitrise.io/build-cache
website: https://github.com/bitrise-steplib/bitrise-step-activate-build-cache-for-xcode
source_code_url: https://github.com/bitrise-steplib/bitrise-step-activate-build-cache-for-xcode
support_url: https://github.com/bitrise-steplib/bitrise-step-activate-build-cache-for-xcode
published_at: 2026-06-29T11:58:41.878499143Z
source:
  git: https://github.com/bitrise-steplib/bitrise-step-activate-build-cache-for-xcode.git
  commit: b3b736c736c44140f42b77eb67523c43f13254cd
type_tags:
- utility
toolkit:
  bash:
    entry_file: step.sh
is_skippable: true
run_if: .IsCI
inputs:
- opts:
    is_required: true
    summary: Enable logging additional information for troubleshooting
    title: Verbose logging
    value_options:
    - "true"
    - "false"
  verbose: "false"
- cache: "true"
  opts:
    is_required: true
    summary: Whether the build uses the remote cache
    title: Use cache
    value_options:
    - "true"
    - "false"
- opts:
    is_required: true
    summary: Whether the build can not only read, but write new entries to the remote
      cache
    title: Push new cache entries
    value_options:
    - "true"
    - "false"
  push: "true"
- opts:
    is_required: true
    summary: |-
      Whether Bitrise components should not log anything except the underlying xcodebuild output.
      Takes precedence over the 'Verbose logging' and 'Add timestamps' options.
    title: Silence all extra Bitrise logging
    value_options:
    - "true"
    - "false"
  silent: "false"
- opts:
    description: When enabled, the analytics wrapper adds timestamps to xcodebuild
      output log messages during the build.
    is_required: true
    summary: Add timestamps to xcodebuild messages
    title: Add timestamps to xcodebuild messages
    value_options:
    - "true"
    - "false"
  timestamps: "false"
- cache_skip_flags: "false"
  opts:
    description: |-
      Skip passing cache flags to xcodebuild except the COMPILATION_CACHE_REMOTE_SERVICE_PATH.

      Cache will have to be enabled manually in the Xcode project settings. More information can be found at the FAQ
      document: https://docs.bitrise.io/en/bitrise-build-cache/build-cache-for-xcode/xcode-compilation-cache-faq.html
    is_required: true
    summary: Skip passing cache flags to xcodebuild
    title: Skip passing cache flags to xcodebuild
    value_options:
    - "true"
    - "false"
- disable_prefix_mapping: "false"
  opts:
    description: |-
      Disable injecting Clang prefix-mapping flags into xcodebuild.

      Prefix mapping canonicalizes rotating source/DerivedData paths so the compilation cache keys stay stable across builds (e.g. when source is checked out into a per-build temp dir). Disable only if it causes issues.
    is_required: true
    summary: Disable injecting Clang prefix-mapping flags into xcodebuild
    title: Disable Clang prefix mapping
    value_options:
    - "true"
    - "false"
