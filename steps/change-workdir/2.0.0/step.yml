type_tags:
- utility
toolkit:
  go:
    package_name: github.com/bitrise-steplib/steps-change-workdir
is_requires_admin_user: false
is_always_run: false
is_skippable: false
inputs:
- opts:
    description: The path to set as the base Working Directory for every subsequent
      Step. It is resolved to an absolute path before being applied.
    is_expand: true
    is_required: true
    summary: New working directory path.
    title: Directory path
  path: null
- is_create_path: "true"
  opts:
    description: When set to `true`, the Step creates the directory (including parent
      directories) if it does not exist yet. When set to `false`, the Step fails if
      the directory is missing.
    is_required: true
    summary: Enable/disable the creation of the directory path in case it doesn't
      exist yet.
    title: Create path if doesn't exist?
    value_options:
    - "true"
    - "false"
- opts:
    description: |-
      When enabled, the Step retries creating the directory with `sudo` if it hits a permission error.

      This is required on stacks where the Step runs as the non-root user and the directory must be created inside a `root`-owned parent directory. Disable this if `sudo` is unavailable in your environment or you want permission errors to fail the Step directly.
    is_required: true
    summary: Retry creating the directory with `sudo` if a permission error occurs.
    title: Use sudo when elevated permissions are required
    value_options:
    - "true"
    - "false"
  use_sudo: "true"
outputs:
- BITRISE_SOURCE_DIR: null
  opts:
    description: |-
      The expanded absolute path that the Step set as the base Working Directory.

      Bitrise uses `BITRISE_SOURCE_DIR` as the Working Directory for every subsequent Step, so changing it is how this Step takes effect.
    summary: The expanded absolute path applied as the base Working Directory for
      every subsequent Step.
    title: New base Working Directory
- PWD: null
  opts:
    description: The expanded absolute path, exported as `PWD` so that subsequent
      Steps and scripts see the new Working Directory.
    summary: The expanded absolute path, also exported as `PWD`.
    title: Current Working Directory
