title: Data Theorem Mobile Secure
summary: |
  Perform automated security analysis on every build.
description: |
  Data Theorem's Mobile Secure will scan each pre-production release automatically (up to 7000 releases/day)
  for security & privacy issues using static, dynamic, and behavioral analysis for both iOS and Android applications.
  More information can be found here: https://www.datatheorem.com/products/mobile-secure

  Enabling this integration requires a valid Data Theorem API Key.
  To find your API Key, connect to https://www.securetheorem.com/sdlc using your Data Theorem account.
website: https://www.datatheorem.com/products/mobile-secure
source_code_url: https://bitbucket.org/datatheorem/dt-bitrise-integration.git
support_url: https://bitbucket.org/datatheorem/dt-bitrise-integration.git
published_at: 2026-06-30T11:35:44.627322-06:00
source:
  git: https://bitbucket.org/datatheorem/dt-bitrise-integration.git
  commit: b55577a33fab779f94ed6054327ba93e944853a5
host_os_tags:
- osx-10.10
- ubuntu-16.04
type_tags:
- test
toolkit:
  bash:
    entry_file: step.sh
deps:
  brew:
  - name: curl
  - name: jq
  apt_get:
  - name: curl
  - name: jq
is_requires_admin_user: false
is_always_run: false
is_skippable: false
run_if: ""
inputs:
- file_path: $BITRISE_APK_PATH
  opts:
    description: |
      This variable can for example be set to:

      $BITRISE\_APK\_PATH after the "Android Build" step
      $BITRISE\_APK\_PATH or $BITRISE\_SIGNED\_APK\_PATH after the "Android Sign" step

      $BITRISE\_IPA\_PATH after the "Xcode Archive & Export for iOS" step
    is_expand: true
    is_required: true
    summary: File path to the APK or IPA to upload
    title: File path to the APK or IPA to upload
    value_options: []
- dt_upload_api_key: ""
  opts:
    description: |
      Instruction to retrieve your upload API key:
      [https://www.securetheorem.com/management/help/7bbdcadc-5921-4b69-9c37-5512e8f2b47b]
    is_expand: true
    is_required: true
    is_sensitive: true
    summary: Data Theorem Upload API Key
    title: Data Theorem Upload API Key
    value_options: []
- opts:
    description: |
      An optional Java mapping.txt file for deobfuscating Android binaries.
    is_expand: true
    is_required: false
    skip_if_empty: true
    summary: Mapping file for deobfuscating Android binaries
    title: Android mapping file
    value_options: []
  sourcemap: ""
- dt_results_api_key: ""
  opts:
    description: |
      Instruction to retrieve your results API key:
      [https://www.securetheorem.com/management/help/7bbdcadc-5921-4b69-9c37-5512e8f2b47b]
    is_expand: true
    is_required: false
    is_sensitive: true
    summary: Data Theorem Results API Key
    title: Data Theorem Results API Key
    value_options: []
- BLOCK_ON_SEVERITY: NONE
  opts:
    description: |
      If set, the step will wait for the scan to complete and fail the build if any
      security issues of the given severity or higher are found.
      Possible values: LOW, MEDIUM, HIGH
    is_expand: true
    is_required: false
    skip_if_empty: true
    summary: Block the build if security issues of this severity or higher are found
    title: Block on severity
    value_options:
    - NONE
    - LOW
    - MEDIUM
    - HIGH
