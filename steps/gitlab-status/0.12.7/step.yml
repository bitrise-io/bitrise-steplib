inputs:
- api_base_url: null
  opts:
    description: |-
      API URL for GitLab or GitLab Enterprise

      Example: "https://gitlab.example.com/api/v4"
    is_required: true
    title: GitLab API base url
- opts:
    description: |-
      Authorization token for GitLab applications

      Generating a [project access token](https://docs.gitlab.com/user/project/settings/project_access_tokens/#create-a-project-access-token):
      1. Log in to your GitLab instance.
      1. Go to **Project -> Settings > Access Tokens**.
      1. Select **Add new token**.
      1. In **Token name**, enter a name.
      1. Select a role for the token.
      1. Select **scope** *api* and *read_api*.
      1. Select **Create project access token**.

      Alternatively generating a [personal access tokens](https://docs.gitlab.com/user/profile/personal_access_tokens/#create-a-personal-access-token):
      1. Log in to your GitLab instance.
      1. In the upper-right corner, select your avatar. Select **Edit profile**.
      1. In the left sidebar, select **Access > Personal access tokens**.
      1. From the **Generate token** dropdown list, select **Legacy token**.
      1. In **Token name**, enter a name for the token.
      1. In **Expiration date**, enter an expiry date for the token
      1. Select **scope** *api* and *read_api*.
      1. Select **Generate token**.
    is_required: true
    is_sensitive: true
    title: GitLab private token
  private_token: null
- opts:
    description: The URL for the repository we are working with
    is_required: true
    title: Repository URL
  repository_url: $GIT_REPOSITORY_URL
- git_ref: $BITRISE_GIT_BRANCH
  opts:
    description: |-
      The name of a repository branch or tag for which the status needs to be reported

      In case of a same commit hash on multiple branches, _ref_  will be used so the pipeline status is updated on the correct branch.
    is_required: true
    title: The name of a repository branch or tag or, if not given, the default branch
- commit_hash: $BITRISE_GIT_COMMIT
  opts:
    description: The commit hash for the commit we are working with
    is_required: true
    title: Commit hash
- opts:
    description: |-
      The target URL to associate with this status.
      This URL will be linked from the GitLab UI to allow users to easily see the source of the status.
    title: Target URL
  target_url: $BITRISE_BUILD_URL
- context: Bitrise
  opts:
    description: |-
      A string label to differentiate this status from the status of other systems.

      If left empty, it will be `default`.
    summary: The Identifier to be used for this status
    title: Context
- opts:
    description: |-
      If set, this Step will set a specific status instead of reporting the current build status.

      Can be one of `auto`, `pending`, `running`, `success`, `failed` or `canceled`.
      If you select `auto`, the Step will send `success` status if the current build status is `success`
      (no Step failed previously) and `failed` status if the build previously failed.
    title: Set Specific Status
    value_options:
    - auto
    - pending
    - running
    - success
    - failed
    - canceled
  preset_status: auto
- description: null
  opts:
    description: |-
      The short description of the status.

      If left empty, it will be the status of the build.
    summary: A short description of the status.
    title: Description
- coverage: null
  opts:
    description: |-
      The test coverage.

      Must be a floating point number between 0.0 and 100.0.
    is_required: false
    summary: Test coverage
    title: Coverage
